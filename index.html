<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحبك</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffe6e6; text-align: center; margin: 0; padding: 20px; color: #4a0e17; }
        .box { background: white; max-width: 450px; margin: 50px auto; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h1 { color: #ff4d6d; }
        input[type="password"] { width: 80%; padding: 10px; margin: 10px 0; border: 2px solid #ffb3c1; border-radius: 10px; text-align: center; font-size: 16px; }
        button { background-color: #ff4d6d; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #c71585; }
        #content { display: none; }
        img { width: 100%; max-width: 300px; border-radius: 15px; margin-top: 15px; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        .message { font-size: 18px; line-height: 1.6; margin-top: 20px; white-space: pre-line; }
    </style>
</head>
<body>

    <!-- صفحة تسجيل الدخول بالباسوورد -->
    <div id="login-box" class="box">
        <h1>🔒 منطقة خاصة جداً</h1>
        <p>اكتبي الكلمة السرية عشان تشوفي بعشق امك:</p>
        <input type="password" id="password" placeholder="اكتبي الباسوورد هنا...">
        <br>
        <button onclick="checkPassword()">بموت فيكي ❤️</button>
        <p id="error" style="color: red; display: none; margin-top: 10px;">الباسوورد غلط يا ست البنات! فكري تاني 😉</p>
    </div>

    <!-- المحتوى السري الذي سيظهر بعد الباسوورد -->
    <div id="content" class="box">
        <h1>أنا آسف</h1>
        
        <!-- الأغنية الخلفية -->
        <audio id="bg-music" src="11.Mahma_T2olo (1).mp3" controls></audio>
        
        <!-- رابط اليوتيوب المعروض كنص كبديل أو وسيلة إضافية -->
        <p style="margin-top: 15px;">
            <a href="https://youtu.be/esrD6lr7WO8?si=aNCAE_6BoLo3AlfR" target="_blank" style="color: #ff4d6d; text-decoration: none; font-weight: bold;">
                اضغطي هنا لفتح رابط الأغنية على يوتيوب 🎵
            </a>
        </p>

        <!-- الرسالة والصورة (يمكنك إضافة رابط صورتكم هنا) -->
        <div class="message">
            أنا آسف على كل حاجة زعلتك مني.. 
            انتي أغلى حاجة في حياتي ومقدرش على زعلك يا ست البنات. ❤️
        </div>
        <img src="https://placeholder.com" alt="صورة تعبيرية">
    </div>

    <script>
        function checkPassword() {
            var passwordInput = document.getElementById("password").value;
            var errorElement = document.getElementById("error");
            var loginBox = document.getElementById("login-box");
            var contentBox = document.getElementById("content");
            var music = document.getElementById("bg-music");

            if (passwordInput === "1234") {
                errorElement.style.display = "none";
                loginBox.style.display = "none";
                contentBox.style.display = "block";
                
                // محاولة تشغيل الموسيقى تلقائياً (تعتمد على إعدادات المتصفح)
                music.play().catch(function(error) {
                    console.log("التشغيل التلقائي للموسيقى يحتاج لتفاعل المستخدم أولاً.");
                });
            } else {
                errorElement.style.display = "block";
            }
        }
    </script>

</body>
</html>
